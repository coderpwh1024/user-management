# Project-scoped Codex configuration for the user-management service.
# Loads only when this repository is trusted by Codex.

approval_policy = "never"
default_permissions = "user-management-workspace"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["AGENTS.md"]
web_search = "cached"

[features]
hooks = true
multi_agent = true
shell_snapshot = true

[permissions.user-management-workspace.filesystem]
glob_scan_max_depth = 4
":minimal" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"

# Git 全局配置读取，避免 git status / pull 访问全局 ignore 失败
"/Users/coderpwh/.gitconfig" = "read"
"/Users/coderpwh/.config/git/ignore" = "read"
"/Users/coderpwh/.gitignore_global" = "read"

# SSH 配置与 GitHub 凭据
"/Users/coderpwh/.ssh/config" = "read"
"/Users/coderpwh/.ssh/known_hosts" = "read"

# 你的机器里同时存在 github_rsa 和 id_ed25519；都放开最省事
"/Users/coderpwh/.ssh/github_rsa" = "read"
"/Users/coderpwh/.ssh/github_rsa.pub" = "read"
"/Users/coderpwh/.ssh/id_ed25519" = "read"
"/Users/coderpwh/.ssh/id_ed25519.pub" = "read"

[permissions.user-management-workspace.filesystem.":workspace_roots"]
"." = "read"
"app" = "write"
"tests" = "write"
"sql" = "write"
"docs" = "write"
".codex" = "write"
".agents" = "write"
".git" = "write"
".venv" = "read"

# 禁止读取 workspace 内的 env 文件
".env" = "deny"
"**/.env" = "deny"
"**/*.env" = "deny"
"**/.env.*" = "deny"

[permissions.user-management-workspace.network]
enabled = true

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
exclude = ["AWS_*", "AZURE_*", "GCP_*", "*PASSWORD*", "*SECRET*", "*TOKEN*", "*KEY*"]